name: Build and Push

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

jobs:
  call-shared-workflow:
    uses: autoshop-crm/shared-workflows/.github/workflows/shared-build.yml@main
    with:
      image_name: autoshop-crm/autoshop-client-web
      dockerfile: FrontClient/Dockerfile
      context: FrontClient
      push_latest: true
