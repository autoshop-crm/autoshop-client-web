server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /client {
        return 301 /client/;
    }

    location /client/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /client/ {
        try_files $uri $uri/ /client/index.html;
    }

    location / {
        return 404;
    }
}
